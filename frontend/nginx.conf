server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 🔥 Manejo de rutas SPA: todas las peticiones van a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cachear archivos estáticos (opcional)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Asegurar que el logo se sirva correctamente
    location = /Logo.png {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}